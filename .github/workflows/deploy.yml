# Deployment workflow — triggers automatically when CI passes on main
# Builds and pushes Docker images to GHCR, then deploys to production server

# Name of the workflow — appears in the GitHub Actions tab
name: Deploy


# Triggered by the CI workflow completing on main
# Only proceeds to deploy if CI actually passed (checked in deploy-latest-images job)
on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: BUILD AND PUSH SCRAPER
  # Builds the scraper Docker image and pushes it
  # to GitHub Container Registry (GHCR).
  # Runs in parallel with build-push-api and build-push-frontend
  # ─────────────────────────────────────────────
  build-push-scraper:
    # Spins up a fresh Ubuntu virtual machine for this job
    runs-on: ubuntu-latest
    steps:
      # Copies the repo onto the runner
      - uses: actions/checkout@v4.2.2

      # Authenticates with GHCR so we can push images
      # github.actor is whoever triggered the workflow
      # GHCR_TOKEN is a personal access token stored in repo secrets
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      
      # Builds the scraper image from the repo root as build context
      # and pushes it to GHCR tagged as latest
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: scraper/Dockerfile
          push: true
          tags: ghcr.io/bryanmurphy02/scraper:latest


  # ─────────────────────────────────────────────
  # JOB 2: BUILD AND PUSH API
  # Same as build-push-scraper but for the api service
  # Runs in parallel with build-push-scraper and build-push-frontend
  # ─────────────────────────────────────────────
  build-push-api:
    # Spins up a fresh Ubuntu virtual machine for this job
    runs-on: ubuntu-latest
    steps:
      # Copies the repo onto the runner
      - uses: actions/checkout@v4.2.2
      
      # logging into GHCR
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      # building and pushing api image
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: ghcr.io/bryanmurphy02/api:latest

  # ─────────────────────────────────────────────
  # JOB 3: BUILD AND PUSH FRONTEND
  # Same as build-push-scraper but for the frontend service
  # Uses a multi-stage build — Node.js compiles the app,
  # nginx serves the output. Only nginx ends up in the final image.
  # Runs in parallel with build-push-scraper and build-push-api
  # ─────────────────────────────────────────────
  build-push-frontend:
    # Spins up a fresh Ubuntu virtual machine for this job
    runs-on: ubuntu-latest
    steps:
      # Copies the repo onto the runner
      - uses: actions/checkout@v4.2.2
      
      # logging into GHCR
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      # building and pushing frontend image
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ghcr.io/bryanmurphy02/frontend:latest

  # ─────────────────────────────────────────────
  # JOB 4: DEPLOY TO PRODUCTION SERVER
  # Runs after all three build jobs pass.
  # Connects to the production server via Tailscale + SSH,
  # writes a fresh .env from GitHub secrets/variables,
  # pulls the new images from GHCR and restarts containers.
  # ─────────────────────────────────────────────
  deploy-latest-images:

    # Grants access to production environment secrets and variables
    # Production environment is configured in GitHub repo settings
    environment: production

    # Only deploy if CI actually passed — not just completed
    # Prevents deploying broken code if CI failed
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    # All three images must be pushed to GHCR before deploying
    needs: [build-push-scraper, build-push-api, build-push-frontend]

    # Spins up a fresh Ubuntu virtual machine for this job
    runs-on: ubuntu-latest
    steps:
      # Joins the Tailscale VPN so the runner can reach the production server
      # The server is not exposed to the public internet — only accessible via Tailscale
      # TAILSCALE_AUTHKEY is an ephemeral reusable key stored in repo secrets
      - uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
      
      # SSHs into the production server and runs the deployment script
      # SERVER_HOST is the Tailscale IP of the server
      # SERVER_USER and SSH_PRIVATE_KEY are stored in repo secrets
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          # first script block makes the .env
          # second script block pulls the git repo and images then runs them
          script: |
            cat > /opt/docker/allergy-safe-recipes/.env << 'EOF'
            DB_HOST=${{ vars.DB_HOST }}
            DB_PORT=${{ vars.DB_PORT }}
            DB_NAME=${{ vars.DB_NAME }}
            DB_USER=${{ vars.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DATABASE_URL=postgresql://${{ vars.DB_USER }}:${{ secrets.DB_PASSWORD }}@database:5432/${{ vars.DB_NAME }}              
            BBC_ENABLED=${{ vars.BBC_ENABLED }}
            SCRAPE_INTERVAL_HOURS=${{ vars.SCRAPE_INTERVAL_HOURS }}
            MAX_SITEMAPS=${{ vars.MAX_SITEMAPS }}
            EOF
            
            
            cd /opt/docker/allergy-safe-recipes
            git pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            